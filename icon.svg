<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060b1a"/>
      <stop offset="100%" stop-color="#0c1a3a"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00c2ff"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- 外圈 -->
  <circle cx="256" cy="210" r="120" fill="none" stroke="rgba(0,194,255,0.2)" stroke-width="2"/>
  <circle cx="256" cy="210" r="135" fill="none" stroke="rgba(0,194,255,0.1)" stroke-width="1" stroke-dasharray="8 8"/>
  <!-- 心电图线 -->
  <polyline points="80,210 180,210 205,210 225,150 245,270 260,100 280,280 300,210 320,210 432,210" 
    fill="none" stroke="url(#line)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- 小圆点装饰 -->
  <circle cx="100" cy="80" r="4" fill="#00c2ff" opacity="0.4"/>
  <circle cx="420" cy="120" r="3" fill="#a855f7" opacity="0.3"/>
  <circle cx="390" cy="420" r="5" fill="#00c2ff" opacity="0.3"/>
  <circle cx="110" cy="380" r="3" fill="#2ed573" opacity="0.3"/>
  <!-- 标哥 -->
  <text x="256" y="370" text-anchor="middle" fill="white" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="72" font-weight="800">标哥</text>
  <!-- HEALTH -->
  <text x="256" y="430" text-anchor="middle" fill="#00c2ff" font-family="SF Pro Display,Helvetica,sans-serif" font-size="36" font-weight="600" letter-spacing="8" opacity="0.7">HEALTH</text>
</svg>
